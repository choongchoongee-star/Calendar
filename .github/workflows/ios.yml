name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Try Xcode 26 first, fall back to whatever is latest available
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n\t ' ; }
          API_KEY=$(trim "${FIREBASE_API_KEY}")
          AUTH_DOMAIN=$(trim "${FIREBASE_AUTH_DOMAIN}")
          PROJECT_ID=$(trim "${FIREBASE_PROJECT_ID}")
          STORAGE_BUCKET=$(trim "${FIREBASE_STORAGE_BUCKET}")
          SENDER_ID=$(trim "${FIREBASE_MESSAGING_SENDER_ID}")
          APP_ID=$(trim "${FIREBASE_APP_ID}")
          if [ -z "${API_KEY}" ]; then
            echo "WARNING: Firebase secrets not set. App will run in guest-only mode."
            echo "// Firebase credentials not configured" > docs/config.js
          else
            cat > docs/config.js << JSEOF
          const firebaseConfig = {
            apiKey: '${API_KEY}',
            authDomain: '${AUTH_DOMAIN}',
            projectId: '${PROJECT_ID}',
            storageBucket: '${STORAGE_BUCKET}',
            messagingSenderId: '${SENDER_ID}',
            appId: '${APP_ID}'
          };
          JSEOF
          fi

      - name: Sync Capacitor
        run: |
          node ./node_modules/.bin/cap sync ios

      - name: Setup Ruby and Xcodeproj
        run: |
          sudo gem install xcodeproj
          ruby add_widget_target.rb

      - name: Install Apple Certificates and Profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          APP_PP_PATH=$RUNNER_TEMP/app.mobileprovision
          WIDGET_PP_PATH=$RUNNER_TEMP/widget.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $APP_PP_PATH
          echo -n "$WIDGET_PROVISION_PROFILE_BASE64" | base64 --decode -o $WIDGET_PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $APP_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/App.mobileprovision
          cp $WIDGET_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/Widget.mobileprovision

      - name: Build and Archive (IPA)
        run: |
          cd ios
          xcodebuild -project App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -resolvePackageDependencies
          
          xcodebuild -project App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE="Manual" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db"

          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist App/App/exportOptions.plist \
            -exportPath $PWD/build

      - name: Verify Bundle Contents
        run: |
          echo "--- Verifying IPA Contents ---"
          mkdir -p $PWD/verify
          unzip -q ios/build/App.ipa -d $PWD/verify
          APP_PATH=$(find $PWD/verify/Payload -name "*.app" -maxdepth 1)
          echo "App found at: $APP_PATH"
          if [ -d "$APP_PATH/PlugIns" ]; then
            echo "✅ PlugIns directory found!"
            ls -R "$APP_PATH/PlugIns"
          else
            echo "❌ ERROR: PlugIns directory (Widgets) is MISSING from the IPA!"
            exit 1
          fi

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ios/build/App.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/*.ipa

  upload_metadata:
    needs: build
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cat > fastlane/api_key.json << KEYEOF
          {
            "key_id": "${APP_STORE_CONNECT_KEY_ID}",
            "issuer_id": "${APP_STORE_CONNECT_ISSUER_ID}",
            "key": "$(echo "$APP_STORE_CONNECT_API_KEY" | sed 's/$/\\n/' | tr -d '\n')",
            "in_house": false
          }
          KEYEOF

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Upload metadata to App Store Connect
        run: fastlane ios upload_metadata

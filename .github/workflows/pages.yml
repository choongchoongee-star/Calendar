name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n\t ' ; }
          API_KEY=$(trim "${FIREBASE_API_KEY}")
          AUTH_DOMAIN=$(trim "${FIREBASE_AUTH_DOMAIN}")
          PROJECT_ID=$(trim "${FIREBASE_PROJECT_ID}")
          STORAGE_BUCKET=$(trim "${FIREBASE_STORAGE_BUCKET}")
          SENDER_ID=$(trim "${FIREBASE_MESSAGING_SENDER_ID}")
          APP_ID=$(trim "${FIREBASE_APP_ID}")
          if [ -z "${API_KEY}" ]; then
            echo "WARNING: Firebase secrets not set."
          else
            cat > docs/config.js << JSEOF
          const firebaseConfig = {
            apiKey: '${API_KEY}',
            authDomain: '${AUTH_DOMAIN}',
            projectId: '${PROJECT_ID}',
            storageBucket: '${STORAGE_BUCKET}',
            messagingSenderId: '${SENDER_ID}',
            appId: '${APP_ID}'
          };
          JSEOF
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
